# LLM 配置
llm:
  provider: "openai"  # claude / openai / ollama / deepseek
  model: "claude-3-7-sonnet-20250219"  # 3.7 Sonnet - 性能强，性价比好
  api_key: "${ANTHROPIC_API_KEY}"  # 从环境变量读取

  # OpenAI 配置（当 provider 为 openai 时使用）
  openai_api_key: "${OPENAI_API_KEY}"
  openai_model: "gpt-4o-mini"

  deepseek_model: "deepseek-chat"      # DeepSeek 模型
  deepseek_api_key: "${DEEPSEEK_API_KEY}" # DeepSeek API Key

  # 摘要 prompt (Smart Brevity 风格)
  summary_prompt: |
    请用中文为以下文章生成结构化摘要，包括将标题翻译成中文：

    原标题：{title}
    内容：{content}

    请严格按以下格式输出（不要添加其他内容）：

    🏷️ [中文标题翻译]

    📌 [一句话核心观点，不超过30字]

    💡 为什么值得关注:
    [1-2句话说明]

    📋 关键要点:
    • [要点1]
    • [要点2]
    • [要点3]

    ⭐ 推荐: [值得精读 / 建议浏览 / 可跳过]

# 推送配置
notify:
  # 飞书
  feishu:
    enabled: true
    webhook_url: "${FEISHU_WEBHOOK}"

  # Telegram
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

  # Email
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: "${EMAIL_USER}"
    password: "${EMAIL_PASS}"
    to: "you@example.com"

# 运行配置
schedule:
  interval_minutes: 15  # 每15分钟检查一次
  max_articles_per_run: 10  # 每次最多处理10篇
  max_age_hours: 24  # 只处理最近24小时内的文章
